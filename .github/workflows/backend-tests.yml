name: Backend Tests

on:
  push:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "fastapi>=0.115.0" "uvicorn[standard]>=0.32.0"

      - name: Compile check
        run: python -m compileall apps/backend/src

      - name: Run backend unit tests
        run: cd apps/backend && python -m unittest discover -s tests -p 'test_*.py'
