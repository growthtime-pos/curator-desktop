name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  atlassian-url-check:
    name: Confluence Backend Fetch Test
    runs-on: ubuntu-latest
    steps:
      - name: Validate Atlassian credentials and fetch Confluence content
        env:
          ATLASSIAN_PW: ${{ secrets.ATLASSIAN_PW || vars.ATLASSIAN_PW }}
          ATLASSIAN_URL: ${{ secrets.ATLASSIAN_URL || vars.ATLASSIAN_URL }}
          ATLASSIAN_ID: ${{ secrets.ATLASSIAN_ID || vars.ATLASSIAN_ID }}
        run: |
          set -euo pipefail

          missing=0
          for key in ATLASSIAN_PW ATLASSIAN_URL ATLASSIAN_ID; do
            if [ -z "${!key:-}" ]; then
              echo "❌ Missing required variable: ${key}" >&2
              missing=1
            else
              echo "✅ Found required variable: ${key}"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more required Atlassian variables are missing." >&2
            exit 1
          fi

          normalized_base="${ATLASSIAN_URL%/}"
          case "$normalized_base" in
            *"/rest/api/"*|*"/wiki/rest/api/"*)
              query_url="${normalized_base%/}/content?limit=1"
              ;;
            *)
              query_url="${normalized_base}/wiki/rest/api/content?limit=1"
              ;;
          esac

          echo "ℹ️ Querying Confluence content API endpoint derived from ATLASSIAN_URL"

          tmp_body=$(mktemp)

          http_code=$(curl -sS -L \
            --connect-timeout 10 \
            --max-time 30 \
            -u "${ATLASSIAN_ID}:${ATLASSIAN_PW}" \
            -H "Accept: application/json" \
            -o "$tmp_body" \
            -w "%{http_code}" \
            "$query_url")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "❌ Atlassian request failed with HTTP ${http_code}" >&2
            echo "Response preview:" >&2
            head -c 300 "$tmp_body" >&2 || true
            rm -f "$tmp_body"
            exit 1
          fi

          python3 - "$tmp_body" <<'PY'
          import json
          import sys
          from pathlib import Path
          
          body = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace").strip()
          if not body:
              print("❌ Confluence API response body is empty.", file=sys.stderr)
              sys.exit(1)
          
          try:
              payload = json.loads(body)
          except json.JSONDecodeError as exc:
              print(f"❌ Confluence API did not return valid JSON: {exc}", file=sys.stderr)
              print(body[:300], file=sys.stderr)
              sys.exit(1)
          
          results = payload.get("results")
          if not isinstance(results, list):
              print("❌ Confluence content response does not include a 'results' array.", file=sys.stderr)
              print(body[:300], file=sys.stderr)
              sys.exit(1)
          
          print(f"✅ Confluence API returned a valid content payload (results={len(results)}).")
          PY

          body_size=$(wc -c < "$tmp_body" | tr -d ' ')
          echo "✅ Confluence backend fetch succeeded (HTTP ${http_code}, ${body_size} bytes)."
          rm -f "$tmp_body"

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm -w apps/desktop run typecheck

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Create screenshots directory
        run: mkdir -p apps/desktop/e2e/screenshots

      - name: Run Playwright tests
        working-directory: apps/desktop
        run: npx playwright test

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: apps/desktop/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/desktop/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: apps/desktop/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment screenshots on PR
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const screenshotDir = 'apps/desktop/e2e/screenshots';
            if (!fs.existsSync(screenshotDir)) return;

            const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('No PR number found, skipping comment.');
              return;
            }

            const body = [
              '## Playwright Test Screenshots',
              '',
              `**${files.length}** screenshot(s) captured from E2E tests.`,
              '',
              'Screenshots are available in the **playwright-screenshots** artifact of this workflow run.',
              '',
              '| Screenshot | File |',
              '|---|---|',
              ...files.map(f => `| screenshot | \`${f}\` |`),
              '',
              `[Download artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.body?.includes('Playwright Test Screenshots') && c.user?.login === 'github-actions[bot]'
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (error) {
              console.log(`Failed to comment on PR: ${error.message}`);
              console.log('This may be due to insufficient permissions. Screenshots are still available as artifacts.');
            }
