name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  atlassian-url-check:
    name: Atlassian URL Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Validate Atlassian credentials and fetch data
        env:
          ATLASSIAN_PW: ${{ secrets.ATLASSIAN_PW || vars.ATLASSIAN_PW }}
          ATLASSIAN_URL: ${{ secrets.ATLASSIAN_URL || vars.ATLASSIAN_URL }}
          ATLASSIAN_ID: ${{ secrets.ATLASSIAN_ID || vars.ATLASSIAN_ID }}
        run: |
          set -euo pipefail

          missing=0
          for key in ATLASSIAN_PW ATLASSIAN_URL ATLASSIAN_ID; do
            if [ -z "${!key:-}" ]; then
              echo "❌ Missing required variable: ${key}" >&2
              missing=1
            else
              echo "✅ Found required variable: ${key}"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more required Atlassian variables are missing." >&2
            exit 1
          fi

          tmp_body=$(mktemp)
          http_code=$(
            curl -sS -L               --connect-timeout 10               --max-time 30               -u "${ATLASSIAN_ID}:${ATLASSIAN_PW}"               -H "Accept: application/json"               -o "$tmp_body"               -w "%{http_code}"               "$ATLASSIAN_URL"
          )

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "❌ Atlassian request failed with HTTP ${http_code}" >&2
            echo "Response preview:" >&2
            head -c 300 "$tmp_body" >&2 || true
            rm -f "$tmp_body"
            exit 1
          fi

          body_size=$(wc -c < "$tmp_body" | tr -d ' ')
          if [ "$body_size" -eq 0 ]; then
            echo "❌ Atlassian response body is empty." >&2
            rm -f "$tmp_body"
            exit 1
          fi

          echo "✅ Atlassian request succeeded (HTTP ${http_code}, ${body_size} bytes)."
          rm -f "$tmp_body"

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm -w apps/desktop run typecheck

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Create screenshots directory
        run: mkdir -p apps/desktop/e2e/screenshots

      - name: Run Playwright tests
        working-directory: apps/desktop
        run: npx playwright test

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: apps/desktop/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/desktop/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: apps/desktop/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Comment screenshots on PR
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const screenshotDir = 'apps/desktop/e2e/screenshots';
            if (!fs.existsSync(screenshotDir)) return;

            const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('No PR number found, skipping comment.');
              return;
            }

            const body = [
              '## Playwright Test Screenshots',
              '',
              `**${files.length}** screenshot(s) captured from E2E tests.`,
              '',
              'Screenshots are available in the **playwright-screenshots** artifact of this workflow run.',
              '',
              '| Screenshot | File |',
              '|---|---|',
              ...files.map(f => `| screenshot | \`${f}\` |`),
              '',
              `[Download artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.body?.includes('Playwright Test Screenshots') && c.user?.login === 'github-actions[bot]'
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
            } catch (error) {
              console.log(`Failed to comment on PR: ${error.message}`);
              console.log('This may be due to insufficient permissions. Screenshots are still available as artifacts.');
            }
