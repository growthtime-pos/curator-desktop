name: Backend Confluence Integration Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-confluence-integration.yml"

jobs:
  confluence-integration:
    name: Confluence Integration (ATLASSIAN_URL/ID/PW)
    runs-on: ubuntu-latest
    env:
      ATLASSIAN_URL: ${{ secrets.ATLASSIAN_URL || vars.ATLASSIAN_URL }}
      ATLASSIAN_ID: ${{ secrets.ATLASSIAN_ID || vars.ATLASSIAN_ID }}
      ATLASSIAN_PW: ${{ secrets.ATLASSIAN_PW || vars.ATLASSIAN_PW }}
      RUN_CONFLUENCE_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: apps/backend
        run: uv sync

      - name: Validate Atlassian env
        run: |
          test -n "$ATLASSIAN_URL"
          test -n "$ATLASSIAN_ID"
          test -n "$ATLASSIAN_PW"

      - name: Run Confluence integration test
        working-directory: apps/backend
        run: uv run pytest -q -m integration
